services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-mcp-backend
    restart: unless-stopped
    ports:
      - "8900:8000"
    volumes:
      - ./data/documents:/app/data/documents
      - ./data/chromadb:/app/data/chromadb
      - ./data/config:/app/data/config
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - DOCUMENTS_DIR=/app/data/documents
      - CONFIG_DIR=/app/data/config
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://192.168.1.52:8902,http://localhost:8902}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - rag-network

  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: rag-mcp-server
    restart: unless-stopped
    ports:
      - "8901:8001"
    volumes:
      - ./data/config:/app/data/config:ro
    environment:
      - BACKEND_URL=http://backend:8000
      - CONFIG_DIR=/app/data/config
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://192.168.1.52:8902,http://localhost:8902}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-192.168.1.52:8901,192.168.1.52:8902,localhost:8901,localhost:8902,mcp-server:8001}
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-mcp-frontend
    restart: unless-stopped
    ports:
      - "8902:80"
    depends_on:
      - backend
      - mcp-server
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
